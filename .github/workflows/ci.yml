name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd server && npx tsc --noEmit
      - run: cd client && npx tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
      JWT_SECRET: test-secret-at-least-thirty-two-characters
      JWT_REFRESH_SECRET: test-refresh-secret-at-least-thirty-two-chars
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd server && npx prisma generate
      - run: cd server && npx vitest run --config vitest.config.unit.ts

  integration-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skycheck
          POSTGRES_PASSWORD: skycheck
          POSTGRES_DB: skycheck_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://skycheck:skycheck@localhost:5432/skycheck_test
      JWT_SECRET: test-secret-at-least-thirty-two-characters
      JWT_REFRESH_SECRET: test-refresh-secret-at-least-thirty-two-chars
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd server && npx prisma generate && npx prisma migrate deploy
      - run: cd server && npx vitest run src/tests/integration/

  docker-build:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t skycheck .
