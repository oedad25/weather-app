<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">
    <!-- ===== Header + Search ===== -->
    <header class="header">
      <div class="title-row">
        <h1 class="app-title">Sky <span>Check</span></h1>
        <button class="btn btn-icon" id="theme-toggle" title="Toggle theme">🌙</button>
        <button class="btn btn-icon hidden" id="history-button" title="Search history">📋</button>
        <span class="user-email hidden" id="user-email"></span>
        <button class="btn btn-secondary hidden" id="logout-button" data-testid="logout-button">Logout</button>
      </div>
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Search for a city..."
          autocomplete="off"
        >
        <button class="btn btn-secondary" id="geo-button" title="Use my location">📍</button>
        <button class="btn btn-secondary" id="unit-toggle" title="Toggle units">°C</button>
        <button class="btn btn-primary" id="search-button">Search</button>
      </div>
    </header>

    <!-- ===== Auth (shown when not logged in) ===== -->
    <div id="auth-container" class="auth-container">
      <div class="auth-card">
        <h2 class="auth-title">Welcome to Sky<span>Check</span></h2>
        <form id="auth-form" class="auth-form">
          <input type="email" id="auth-email" data-testid="email-input" placeholder="Email" required autocomplete="email">
          <input type="password" id="auth-password" data-testid="password-input" placeholder="Password (min 8 chars)" required minlength="8">
          <div class="auth-buttons">
            <button type="submit" class="btn btn-primary" id="login-button" data-testid="login-button">Log In</button>
            <button type="button" class="btn btn-secondary" id="register-button" data-testid="register-button">Register</button>
          </div>
          <p id="auth-error" class="auth-error hidden"></p>
        </form>
      </div>
    </div>

    <!-- ===== Favorites (shown when user has saved cities) ===== -->
    <div id="favorites-container" class="hidden"></div>

    <!-- ===== Welcome State (visible on first load) ===== -->
    <div id="welcome-container" class="welcome">
      <span class="welcome-icon">🌤️</span>
      <p>Search for any city to see<br>current weather and forecast</p>
    </div>

    <!-- ===== Loading State (hidden by default) ===== -->
    <div id="loading-container" class="loading hidden">
      <div class="spinner"></div>
      <p>Fetching weather data...</p>
    </div>

    <!-- ===== Error State (hidden by default) ===== -->
    <div id="error-container" class="error hidden">
      <span class="error-icon">😕</span>
      <p>Something went wrong</p>
    </div>

    <!-- ===== Weather Display (hidden until data loads) ===== -->
    <div id="weather-container" class="hidden">
      <!-- Content is dynamically generated by ui.ts -->
    </div>

    <!-- ===== Search History (hidden until toggled) ===== -->
    <div id="history-container" class="hidden">
      <div class="history-card">
        <div class="history-header">
          <h3 class="forecast-title">Search History</h3>
          <button class="btn btn-icon" id="history-close">&times;</button>
        </div>
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <!-- Load compiled TypeScript (after DOM is ready) -->
  <script type="module" src="dist/app.js"></script>

</body>
</html>
